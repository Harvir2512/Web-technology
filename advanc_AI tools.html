<!DOCTYPE html>
<html>
<head>
  <title>AI CRM PRO</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; background:#f2f2f2; padding:20px; }
    .box { background:white; padding:15px; margin:10px; border-radius:10px; }
    input, textarea { width:100%; padding:10px; margin:5px 0; }
    button { padding:10px; background:green; color:white; border:none; }
  </style>
</head>
<body>

<h2>🚀 AI CRM PRO (Login + Cloud)</h2>

<!-- LOGIN -->
<div class="box">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADD CUSTOMER -->
<div class="box">
  <h3>Add Customer</h3>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <button onclick="addCustomer()">Save</button>
</div>

<!-- LIST -->
<div class="box">
  <h3>Customers</h3>
  <ul id="list"></ul>
</div>

<!-- AI -->
<div class="box">
  <h3>AI Generator</h3>
  <textarea id="aiInput"></textarea>
  <button onclick="ai()">Generate</button>
  <p id="out"></p>
</div>

<script>
// 🔥 Firebase Config (APNA DALNA)
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login() {
  let email = email.value;
  let pass = password.value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(()=> alert("Login Success"))
    .catch(()=> alert("Error"));
}

// ADD CUSTOMER
function addCustomer() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  db.collection("customers").add({ name, phone });
  load();
}

// LOAD DATA
function load() {
  db.collection("customers").get().then(data=>{
    let list = document.getElementById("list");
    list.innerHTML = "";
    data.forEach(doc=>{
      let c = doc.data();
      list.innerHTML += `<li>${c.name} - ${c.phone}</li>`;
    });
  });
}

// AI
async function ai() {
  let input = document.getElementById("aiInput").value;

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer YOUR_API_KEY"
    },
    body: JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{role:"user", content:input}]
    })
  });

  let data = await res.json();
  document.getElementById("out").innerText =
    data.choices[0].message.content;
}

load();
</script>

</body>
</html>
