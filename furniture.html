<!DOCTYPE html>
<html>
<head>
    <title>Furniture Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .product {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 5px gray;
        }
        .product img {
            width: 300px;
            height: 200px;
            display: block;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .price {
            color: green;
            font-weight: bold;
        }
        .buy-btn {
            background: orange;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .buy-btn:hover {
            background: darkorange;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to My Furniture Store</h1>
        <p>Buy & Sell Furniture Online</p>
    </div>

    <div class="product">
        <img src="sofa.jpg" alt="Sofa Set">
        <p>Comfortable 3-seater sofa with cushions.</p>
        <p class="price">Price: ₹15,000</p>
        <button class="buy-btn" onclick="alert('You selected Sofa Set!')">Buy Now</button>
    </div>

    <div class="product">
        <img src="dining.jpg" alt="Dining Table">
        <p>Wooden dining table with 4 chairs.</p>
        <p class="price">Price: ₹12,000</p>
        <button class="buy-btn" onclick="alert('You selected Dining Table!')">Buy Now</button>
    </div>

    <div class="product">
        <img src="bed.jpg" alt="Bed">
        <p>King size bed with storage.</p>
        <p class="price">Price: ₹20,000</p>
        <button class="buy-btn" onclick="alert('You selected Bed!')">Buy Now</button>
    </div>
</body>
</html>
